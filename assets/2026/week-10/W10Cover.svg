<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cover image for Nuclear Is Back to Building the Future</title>
  <desc id="desc">An editorial cover with cool neutral tones, abstract grid lines, and publication typography for the latest Finding Critical Path edition.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7f8"/>
      <stop offset="100%" stop-color="#dde6ea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34586a"/>
      <stop offset="100%" stop-color="#1d3342"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="96" y="80" width="1408" height="840" rx="28" fill="#fbfbfa" stroke="#cdd6db" stroke-width="2"/>
  <rect x="156" y="148" width="500" height="18" fill="#1d3342" opacity="0.14"/>
  <rect x="156" y="780" width="1240" height="1.5" fill="#a9b7bf"/>
  <rect x="1010" y="220" width="360" height="360" rx="24" fill="url(#accent)" opacity="0.94"/>
  <circle cx="1190" cy="400" r="112" fill="none" stroke="#dfe8eb" stroke-width="2.5" opacity="0.55"/>
  <path d="M1038 510 L1162 386 L1238 462 L1356 344" fill="none" stroke="#f5f8f9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M274 692 C474 604 642 520 798 368" fill="none" stroke="#90a5b0" stroke-width="2" opacity="0.42"/>
  <path d="M304 736 C552 658 748 564 920 412" fill="none" stroke="#90a5b0" stroke-width="2" opacity="0.28"/>
  <text x="156" y="228" fill="#5d6971" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="28" letter-spacing="7">Finding Critical Path</text>
  <text x="156" y="300" fill="#172026" font-family="Georgia, Times New Roman, serif" font-size="86" font-weight="600">Nuclear Is Back</text>
  <text x="156" y="392" fill="#172026" font-family="Georgia, Times New Roman, serif" font-size="86" font-weight="600">to Building the Future</text>
  <text x="156" y="476" fill="#5d6971" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="31">March 23-29, 2026</text>
  <text x="156" y="600" fill="#43525a" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="30">Signals shaping deployment, execution, and industrial readiness.</text>
  <text x="156" y="840" fill="#5d6971" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="24" letter-spacing="6">FROM EMERGING SIGNALS TO DIRECTION</text>
</svg>
